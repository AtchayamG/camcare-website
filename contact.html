<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CamCare - Contact</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>

    <div id="header"></div>

    <!-- HERO BANNER -->
    <section class="page-banner">
        <div class="container text-center">
            <h1>Contact Us</h1>
            <p>Home / Contact Us</p>
        </div>
    </section>

    <!-- CONTACT FORM SECTION -->
    <section class="section">
        <div class="container">
            <div class="row align-items-center g-5">

                <!-- FORM -->
                <div class="col-lg-6">
                    <div class="contact-card">
                        <h3 class="mb-4">Send Us a Message</h3>

                        <form>
                            <div class="mb-3">
                                <input type="text" class="form-control" placeholder="Name">
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <input type="text" class="form-control" placeholder="Phone No.">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <input type="email" class="form-control" placeholder="Email">
                                </div>
                            </div>

                            <div class="mb-3">
                                <textarea class="form-control" rows="5" placeholder="Message Here..."></textarea>
                            </div>

                            <button type="submit" class="btn btn-primary-custom w-100">
                                Send Message
                            </button>
                        </form>
                    </div>
                </div>

                <!-- IMAGE -->
                <div class="col-lg-6 text-center">
                    <img src="assets/images/contact-illustration.png" class="img-fluid contact-img"
                        alt="Contact Illustration">
                </div>

            </div>
        </div>
    </section>

    <!-- GOOGLE MAP -->
    <section class="map-section">
        <iframe src="https://www.google.com/maps?q=Thillainagar,Trichy,Tamil%20Nadu&output=embed" width="100%"
            height="450" style="border:0;" allowfullscreen="" loading="lazy">
        </iframe>
    </section>

    <!-- CONTACT STRIP -->
    <section class="contact-strip">
        <div class="container">
            <div class="row text-white">

                <div class="col-md-4">
                    <h5>Address</h5>
                    <p>
                        C-14, 10th Cross<br>
                        Thillainagar West Extension,<br>
                        Tiruchirappalli,<br>
                        Tamil Nadu - 620018
                    </p>
                </div>

                <div class="col-md-4">
                    <h5>Contact</h5>
                    <p>
                        techvisiontry18@gmail.com<br>
                        +91 81108 40375
                    </p>
                </div>

                <div class="col-md-4">
                    <h5>Working Hours</h5>
                    <p>
                        Mon - Sat: 9:00 AM - 7:00 PM<br>
                        Sunday: Holiday
                    </p>
                </div>

            </div>
        </div>
    </section>

    <div id="footer"></div>

    <script src="assets/js/layout.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
